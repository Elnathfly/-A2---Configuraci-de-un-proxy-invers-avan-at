user root;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Definició del camí de la memòria cau
    proxy_cache_path /tmp/cache levels=1:2 keys_zone=my_cache:10m max_size=100m inactive=60m use_temp_path=off;

    upstream backend_servers {
        # Balanç de càrrega Round Robin (per defecte)
        server web1:80;
        server web2:80;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend_servers;
            
            # Configuració de la memòria cau (Forçada)
            proxy_cache my_cache;
            proxy_cache_valid 200 302 60m;
            proxy_cache_valid 404 1m;
            
            # Ignorar capçaleres de control de cache del backend (Apache)
            proxy_ignore_headers Cache-Control Expires Set-Cookie;
            
            # Afegir capçalera per verificar quin backend respon
            add_header X-Backend-IP $upstream_addr;
            
            # Afegir capçalera per verificar HIT/MISS
            add_header X-Cache-Status $upstream_cache_status;
            
            # Passar capçaleres originals
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
