services:
  web1:
    image: httpd:latest
    container_name: apache_node_1
    volumes:
      - ./html:/usr/local/apache2/htdocs/
    networks:
      - backend

  web2:
    image: httpd:latest
    container_name: apache_node_2
    volumes:
      - ./html:/usr/local/apache2/htdocs/
    networks:
      - backend

  proxy:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/cache:/var/cache/nginx
    depends_on:
      - web1
      - web2
    networks:
      - backend

networks:
  backend:
    driver: bridge
